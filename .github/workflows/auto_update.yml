name: Auto Update M3U8

on:
  schedule:
    # Berjalan secara automatik setiap 1 jam sekali
    - cron: '0 * * * *'
  workflow_dispatch: # Boleh klik butang run manual dari web GitHub

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
    - name: Semak keluar kod (Checkout)
      uses: actions/checkout@v4

    - name: Sediakan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Pasang yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Jalankan Skrip Loop 2 Minit
      run: python update_live.py
      
