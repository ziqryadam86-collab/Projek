name: Auto Update M3U8

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
    - name: Semak keluar kod (Checkout)
      uses: actions/checkout@v4
      with:
        persist-credentials: true  # Ini penting untuk bagi kebenaran push

    - name: Sediakan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Pasang yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Jalankan Skrip Loop 2 Minit
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Memasukkan token keselamatan
      run: python update_live.py
